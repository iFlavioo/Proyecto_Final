server:
  port: 8080
spring:
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        # ─── Rutas de negocio ────────────────────────────────────────────────
        - id: usuario-service
          uri: http://localhost:8081
          predicates: [Path=/api/v1/usuarios/**]
        - id: resena-service
          uri: http://localhost:8082
          predicates: [Path=/api/v1/resenas/**]
        - id: devolucion-service
          uri: http://localhost:8083
          predicates: [Path=/api/v1/devoluciones/**]
        - id: producto-service
          uri: http://localhost:8084
          predicates: [Path=/api/v1/productos/**]
        - id: inventario-service
          uri: http://localhost:8085
          predicates: [Path=/api/v1/inventario/**]
        - id: venta-service
          uri: http://localhost:8086
          predicates: [Path=/api/v1/ventas/**]
        - id: pedido-service
          uri: http://localhost:8087
          predicates: [Path=/api/v1/pedidos/**]
        - id: despacho-service
          uri: http://localhost:8088
          predicates: [Path=/api/v1/despachos/**]
        - id: sucursal-service
          uri: http://localhost:8089
          predicates: [Path=/api/v1/sucursales/**]
        - id: proveedor-service
          uri: http://localhost:8090
          predicates: [Path=/api/v1/proveedores/**]
        - id: transferencia-service
          uri: http://localhost:8091
          predicates: [Path=/api/v1/transferencias/**]
        - id: descuento-service
          uri: http://localhost:8092
          predicates: [Path=/api/v1/descuentos/**]
        - id: notificacion-service
          uri: http://localhost:8093
          predicates: [Path=/api/v1/notificaciones/**]
        # ─── Documentacion OpenAPI ───────────────────────────────────────────
        # Cada servicio expone su Swagger bajo /api/v1/{recurso}/** (api-docs y
        # swagger-ui), por lo que las rutas de negocio de arriba ya la enrutan.
        # No se necesitan rutas de documentacion adicionales.

# ─── Swagger UI agregado: una sola URL con el desplegable de todos los servicios ───
# Disponible en: http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: true
    urls-primary-name: usuario-service
    urls:
      - name: usuario-service
        url: /usuario-service/v3/api-docs
      - name: resena-service
        url: /resena-service/v3/api-docs
      - name: devolucion-service
        url: /devolucion-service/v3/api-docs
      - name: producto-service
        url: /producto-service/v3/api-docs
      - name: inventario-service
        url: /inventario-service/v3/api-docs
      - name: venta-service
        url: /venta-service/v3/api-docs
      - name: pedido-service
        url: /pedido-service/v3/api-docs
      - name: despacho-service
        url: /despacho-service/v3/api-docs
      - name: sucursal-service
        url: /sucursal-service/v3/api-docs
      - name: proveedor-service
        url: /proveedor-service/v3/api-docs
      - name: transferencia-service
        url: /transferencia-service/v3/api-docs
      - name: descuento-service
        url: /descuento-service/v3/api-docs
      - name: notificacion-service
        url: /notificacion-service/v3/api-docs
