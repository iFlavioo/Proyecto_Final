# ============================================================
# inventario-service — BookPoint Chile
# ============================================================
spring:
  application:
    name: inventario-service
  profiles:
    active: dev

server:
  port: 8085

springdoc:
  api-docs:
    path: /api/v1/inventario/v3/api-docs
  swagger-ui:
    path: /api/v1/inventario/swagger-ui.html

services:
  producto-service:
    url: http://localhost:8084
  sucursal-service:
    url: http://localhost:8089

---
# ── Perfil: dev (desarrollo local con XAMPP/MySQL) ─────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/inventario_db?useSSL=false&serverTimezone=UTC
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

---
# ── Perfil: prod (despliegue / servidor real) ───────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/inventario_db?useSSL=false&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
